name: Build Hawlak Driver APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Java (for Gradle) ──────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install dependencies ───────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. Build web assets ───────────────────────────────────
      - name: Build Vite
        run: npm run build

      - name: Copy public assets to dist
        run: |
          cp public/*.png dist/ 2>/dev/null || true
          cp public/*.jpg dist/ 2>/dev/null || true
          cp public/*.json dist/ 2>/dev/null || true
          cp public/sw.js dist/ 2>/dev/null || true

      # ── 7. Capacitor sync ─────────────────────────────────────
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── 8. Build debug APK ────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 9. Rename APK ─────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/hawlak-driver.apk
          ls -lh apk-output/

      # ── 10. Create / update GitHub Release ────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "تطبيق السائق حولك — آخر إصدار"
          body: |
            ## 📱 تطبيق السائق — حولك لوجيستك

            **كيفية التثبيت على Android:**
            1. حمّل ملف `hawlak-driver.apk`
            2. افتح الملف على هاتفك
            3. اسمح بتثبيت التطبيقات من مصادر غير معروفة إذا طُلب منك
            4. اضغط تثبيت

            ---
            بُني تلقائياً بتاريخ ${{ github.event.head_commit.timestamp }}
          files: apk-output/hawlak-driver.apk
          make_latest: true
          prerelease: false
